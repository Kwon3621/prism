<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Prism 뉴스 프레임 비교 검색 결과"
  >
  <title>검색 결과 | Prism</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

<header class="site-header">
  <div class="container header-inner">

    <a class="logo" href="index.html" aria-label="Prism 홈으로 이동">
      Prism
    </a>

    <nav class="nav" data-nav aria-label="주요 메뉴">
      <a href="index.html#live-news">이슈 둘러보기</a>
      <a href="index.html#saved-section">저장한 이슈</a>
      <a href="index.html#how-it-works">분석 방식</a>
    </nav>

    <div class="header-actions">
      <button
        class="btn btn-secondary"
        id="btn-login-nav"
        type="button"
      >
        로그인
      </button>

      <button
        class="menu-toggle"
        data-menu-toggle
        type="button"
        aria-label="메뉴 열기"
        aria-expanded="false"
      >
        ☰
      </button>
    </div>

  </div>
</header>

<main>

  <section class="page-hero">
    <div class="container">

      <span class="eyebrow">Search</span>

      <h1 data-search-title>
        검색 결과
      </h1>

      <form class="search-panel" data-search-form>
        <div class="search-row">

          <input
            class="search-input"
            type="search"
            aria-label="이슈 검색어 입력"
            placeholder="비교하고 싶은 이슈나 키워드를 검색하세요"
          >

          <button
            class="btn btn-primary"
            type="submit"
          >
            이슈 검색
          </button>

        </div>

        <div class="search-help" data-search-help>
          기사 키워드를 불러오는 중...
        </div>
      </form>

    </div>
  </section>

  <section class="section">
    <div class="container">
      <div
        class="search-results"
        data-search-results
      ></div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">

    <div class="footer-grid">
      <div>
        <div class="footer-logo">Prism</div>
        <p class="footer-desc">
          같은 사건을 다룬 여러 언론사의 보도 방식을 비교합니다.
        </p>
      </div>

      <div class="footer-links">
        <a href="index.html">서비스 소개</a>
        <a href="index.html#saved-section">저장한 이슈</a>
        <a href="index.html#how-it-works">분석 방식</a>
      </div>
    </div>

    <div class="footer-bottom">
      © 2026 Prism. All rights reserved.
    </div>

  </div>
</footer>

<script src="./search.js"></script>
<script src="./app.js"></script>

</body>
</html>
