<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Prism 뉴스 프레임 비교 검색 결과"
  >
  <title>검색 결과 | Prism</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logos/favicon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="index.html" aria-label="Prism 홈으로 이동">
      <img src="./assets/logos/prism-icon.svg" alt="" width="25" height="25">
      Prism
    </a>

    <nav class="nav" data-nav aria-label="주요 메뉴" style="display: flex; align-items: center; gap: 24px;">
      <a href="about.html" style="font-weight: 700;">사이트 설명</a>
      <a href="index.html#topics" style="font-weight: 700;">실시간 핫토픽</a>
      <a href="index.html#saved-section" style="font-weight: 700;">내가 저장한 이슈</a>
    </nav>

    <div class="header-actions">
      <button
        class="btn btn-secondary"
        id="btn-login-nav"
        type="button"
      >
        로그인
      </button>

      <button
        class="menu-toggle"
        data-menu-toggle
        type="button"
        aria-label="메뉴 열기"
        aria-expanded="false"
      >
        ☰
      </button>
    </div>

  </div>
</header>

<main>

  <section class="page-hero">
    <div class="container">

      <span class="eyebrow">Search</span>

      <h1 data-search-title>
        검색 결과
      </h1>

      <form class="search-panel" data-search-form>
        <div class="search-row">

          <input
            class="search-input"
            type="search"
            aria-label="이슈 검색어 입력"
            placeholder="비교하고 싶은 이슈나 키워드를 검색하세요"
          >

          <button
            class="btn btn-primary"
            type="submit"
          >
            이슈 검색
          </button>

        </div>

      </form>

    </div>
  </section>

  <section class="section">
    <div class="container">
      <div
        class="search-results"
        data-search-results
      ></div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div>
        <div class="footer-logo">Prism</div>
        <p class="footer-desc">같은 사건을 다룬 여러 언론사의 보도 방식을 비교합니다.</p>
      </div>
      <div class="footer-links">
        <a href="about.html">서비스 소개</a>
        <a href="mailto:jsw5855@naver.com">문의</a>
      </div>
    </div>
    <div class="footer-bottom">© 2026 Prism. All rights reserved.</div>
  </div>
</footer>

<script src="./search.js"></script>
<script src="./app.js"></script>

<div id="login-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
  <div style="background: white; padding: 32px; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: relative;">

    <h3 id="modal-title" style="margin-top: 0; margin-bottom: 8px; font-size: 20px;">Prism 로그인</h3>
    <p id="modal-desc" style="color: #666; font-size: 14px; margin-bottom: 24px;">서비스 이용을 위해 로그인을 진행해 주세요.</p>

    <form id="auth-form">
      <div id="field-name" style="margin-bottom: 16px; display: none;">
        <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px;">이름</label>
        <input type="text" id="auth-name" placeholder="홍길동" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
      </div>

      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px;">아이디 (이메일)</label>
        <input type="email" id="auth-email" placeholder="example@email.com" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
      </div>

      <div style="margin-bottom: 24px;">
        <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px;">비밀번호</label>
        <input type="password" id="auth-password" placeholder="••••••••" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
      </div>

      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <button type="button" id="btn-close-modal" class="btn btn-secondary" style="flex: 1; padding: 10px 0;">취소</button>
        <button type="submit" id="btn-auth-submit" class="btn btn-primary" style="flex: 1; padding: 10px 0; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">로그인</button>
      </div>

      <div style="text-align: center; font-size: 13px; color: #666;">
        <span id="switch-text">아직 계정이 없으신가요?</span>
        <a href="#" id="link-switch-auth" style="color: #007bff; text-decoration: none; margin-left: 4px; font-weight: bold;">회원가입</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
