name: Update RSS News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,6,12,18 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v5

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r scripts/requirements.txt

      - name: RSS 수집, 벡터 인덱스, 핫토픽 갱신
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: |
          python scripts/generate_news.py
          python scripts/index_articles.py --source data/news.json
          python scripts/build_featured_issues.py

      - name: 변경된 뉴스, 벡터 인덱스, 핫토픽 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/vector_store/records.json data/vector_store/embeddings.npy data/issue.json data/issue_details.json
          git diff --cached --quiet || git commit -m "auto update RSS news, vector index, and featured issues"
          git push
