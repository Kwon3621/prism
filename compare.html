<main data-compare-page>
    <!-- [1단계] 이슈 메인 요약 영역 -->
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" id="compare-query-category">종합 분석</span>
        <h1 id="compare-query-title">이슈를 분석하는 중입니다</h1>
        <p id="compare-query-summary" style="font-size: 18px; line-height: 1.7; max-width: 800px; margin-top: 12px; color: var(--text-2);">
          기사 데이터를 바탕으로 핵심 쟁점을 요약하고 있습니다.
        </p>
  
        <div class="toolbar" style="margin-top: 24px;">
          <button class="btn btn-primary" data-save-issue>이 분석 저장하기</button>
          <button class="btn btn-secondary" data-share>공유</button>
        </div>
      </div>
    </section>
  
    <!-- [2단계] 비슷한 프레임 언론사 그룹 시각화 섹션 -->
    <section class="section soft" style="padding: 60px 0; border-bottom: 1px solid var(--border);">
      <div class="container">
        <h2 class="section-title" style="font-size: 24px; margin-bottom: 8px;">📊 프레임 맵핑 (언론사 그룹화)</h2>
        <p class="section-desc" style="margin-bottom: 24px;">Solar LLM이 보도 태도와 논조의 유사도를 분석하여 같은 시선을 가진 미디어끼리 분류했습니다.</p>
        
        <!-- 시각화 그룹 컨테이너 -->
        <div id="frame-group-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;">
          <!-- JS로 동적 프레임 그룹이 렌더링됩니다 -->
        </div>
      </div>
    </section>
  
    <!-- [3단계] 언론사 선택 및 5대 항목 정밀 상세 비교 섹션 -->
    <section class="section">
      <div class="container">
        <h2 class="section-title" style="font-size: 24px; margin-bottom: 8px;">🔍 언론사 정밀 대조 (최대 4개 선택)</h2>
        <p class="section-desc" style="margin-bottom: 20px;">비교 분석할 언론사를 선택해 주세요. (최대 4개 매체 동시 비교 가능)</p>
  
        <!-- 언론사 수동 선택 칩 컨테이너 -->
        <div id="compare-publisher-chips" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; padding: 16px; background: var(--bg-soft); border-radius: 12px; border: 1px solid var(--border);">
          <!-- JS로 선택/해제 가능한 칩 버튼들이 생성됩니다 -->
        </div>
  
        <!-- 5대 비교 지표 대조 테이블/그리드 -->
        <div id="detail-compare-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
          <!-- 선택된 언론사들의 5대 비교 정보 카드가 동적으로 주입됩니다 -->
        </div>
      </div>
    </section>
  </main>
